<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Flooder | Blooket / Gimkit / Kahoot</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #6366f1;
            --text: #f8fafc;
            --text2: #94a3b8;
            --blook: #8b5cf6;
            --gimkit: #10b981;
            --kahoot: #f59e0b;
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }

        .wrapper {
            background: var(--card);
            width: 100%;
            max-width: 800px;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 { font-size: 2rem; margin-bottom: 5px; font-weight: 800; letter-spacing: -1px; }
        p.subtitle { color: var(--text2); font-size: 0.9rem; margin-bottom: 20px; }

        /* Tabs */
        .tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        
        .tab-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text2);
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .tab-btn:hover { background: rgba(255,255,255,0.1); }
        .tab-btn.active { 
            color: var(--bg); 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .tab-btn[data-game="blooket"].active { background: var(--blook); }
        .tab-btn[data-game="gimkit"].active { background: var(--gimkit); }
        .tab-btn[data-game="kahoot"].active { background: var(--kahoot); }

        /* Inputs */
        .control-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* Output Area */
        .output-window {
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            min-height: 150px;
            max-height: 250px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #a5b4fc;
            margin-bottom: 20px;
        }

        /* Buttons */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-action {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-action:hover { filter: brightness(1.1); transform: translateY(-1px); }
        
        .btn-copy { background: #334155; color: white; border: 1px solid #475569; }
        .btn-copy:hover { background: #475569; }

        .btn-script { background: transparent; border: 1px dashed var(--text2); color: var(--text2); padding: 10px; font-size: 0.9rem; }
        .btn-script:hover { border-color: var(--accent); color: var(--accent); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
            z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .control-panel { grid-template-columns: 1fr; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>Game Flooder</h1>
        <p class="subtitle">Universal Tool for Blooket, Gimkit & Kahoot</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" data-game="blooket">Blooket</button>
        <button class="tab-btn" data-game="gimkit">Gimkit</button>
        <button class="tab-btn" data-game="kahoot">Kahoot</button>
    </div>

    <div class="control-panel">
        <div class="input-group">
            <label>Bot Count: <span id="count-val" style="color:var(--accent)">100</span></label>
            <input type="range" id="bot-count" min="1" max="500" value="100">
        </div>
    </div>

    <div class="output-window" id="output-box">
        <!-- Generated content goes here -->
    </div>

    <div class="actions">
        <button class="btn-action" id="btn-gen">
            🔄 Generate Names
        </button>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-action btn-copy" id="btn-copy-names">
                📋 Copy Names
            </button>
            <button class="btn-action btn-copy" id="btn-download">
                💾 Download .txt
            </button>
        </div>

        <button class="btn-action btn-script" id="btn-console">
            ⌨️ Copy Console Script (Auto-Inject)
        </button>
    </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
    // --- Name Databases ---
    const db = {
        blooket: [
            "BlooketKing", "BlooketQueen", "BrainyBlook", "GoldBlook", "LegendaryBlook",
            "BlooketGod", "BlooketPro", "BlooketHero", "RareBlook", "CommonBlook",
            "MathMaster", "QuizWhiz", "TriviaTitan", "FactFinder", "BrainBox",
            "FancyBlook", "RoyalBlook", "EpicBlook", "StealthBlook", "NightBlook",
            "RedBlook", "BlueBlook", "GreenBlook", "PurpleBlook", "YellowBlook",
            "BlooketSoul", "CoolCat", "SuperStar", "Gamer123", "ProGamer"
        ],
        gimkit: [
            "GimkitPro", "GimkitMaster", "MathNinja", "GimkitGenius", "GimkitBrain",
            "PowerUp", "DoublePoints", "StreakKing", "ScoreStorm", "LevelUp",
            "GimkitFanatic", "QuizWhiz", "SmartStudent", "KnowledgeSeeker", "GimkitHero",
            "EasyWin", "HardMode", "TeamPlayer", "SoloSaver", "Survivor",
            "GimkitGod", "GimkitLegend", "MathMaven", "StreakWizard", "PointPro"
        ],
        kahoot: [
            "KahootKid", "TriviaKing", "QuizMaster", "Student99", "ClassLeader",
            "BrainyStudent", "HomeworkHero", "StudySmart", "TestTaker", "ExamAce",
            "LuckyGuess", "KnowledgeNinja", "FactFinder", "HistoryBuff", "MathWhiz",
            "ScienceStar", "GeoGenius", "GeoWizard", "GeoGeek", "GeoGuru",
            "QuizKid", "SmartAlex", "CoolDave", "FastFinn", "BraveBeth"
        ]
    };

    // --- State ---
    let currentGame = 'blooket';
    let currentCount = 100;
    let generatedList = [];

    // --- DOM Elements ---
    const tabs = document.querySelectorAll('.tab-btn');
    const range = document.getElementById('bot-count');
    const countVal = document.getElementById('count-val');
    const outputBox = document.getElementById('output-box');
    const toast = document.getElementById('toast');

    // --- Events ---
    tabs.forEach(btn => {
        btn.addEventListener('click', () => {
            tabs.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentGame = btn.dataset.game;
            generate(); // Re-generate on tab switch
        });
    });

    range.addEventListener('input', (e) => {
        currentCount = e.target.value;
        countVal.textContent = currentCount;
        generate();
    });

    document.getElementById('btn-gen').addEventListener('click', generate);
    
    document.getElementById('btn-copy-names').addEventListener('click', () => {
        navigator.clipboard.writeText(generatedList.join(', '));
        showToast('Names copied!');
    });

    document.getElementById('btn-console').addEventListener('click', () => {
        const script = getConsoleScript();
        navigator.clipboard.writeText(script);
        showToast('Console script copied!');
    });

    document.getElementById('btn-download').addEventListener('click', () => {
        const blob = new Blob([generatedList.join('\n')], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${currentGame}-bots.txt`;
        a.click();
    });

    // --- Logic ---
    function generate() {
        const source = db[currentGame];
        generatedList = [];
        
        // Generate names
        for (let i = 0; i < currentCount; i++) {
            const name = source[Math.floor(Math.random() * source.length)];
            generatedList.push(name);
        }

        // Render names in box (limit to first 50 for preview)
        outputBox.textContent = generatedList.slice(0, 50).join(', ');
        if (currentCount > 50) {
            outputBox.textContent += `\n... and ${currentCount - 50} more generated ...`;
        }
    }

    function getConsoleScript() {
        const namesStr = `"${generatedList.join('", "')}"`;
        
        let script = `// === ${currentGame.toUpperCase()} FLOODER SCRIPT ===\n// 1. Open the game\n// 2. Press F12 (Console)\n// 3. Paste this code and hit Enter\n\n`;
        
        script += `window.temp${currentGame.charAt(0).toUpperCase() + currentGame.slice(1)}PlayerList = [${namesStr}];`;
        script += `\n\n// Done! Now go back to the lobby and click "Add Players".`;
        return script;
    }

    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Initial Generate
    generate();

</script>
</body>
</html>
